services:
  node:
    container_name: node-container
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: always
    depends_on:
      - mysql
    networks:
      - bookridge-network

  mysql:
    container_name: mysql-container
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      TZ: Asia/Seoul
      LANG: C.UTF-8
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - bookridge-network

  nginx:
    container_name: nginx-container
    image: nginx:latest
    depends_on:
      - node
      - mysql
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d
      - /etc/letsencrypt:/etc/letsencrypt:ro 
    networks:
      - bookridge-network

networks:
  bookridge-network:
    driver: bridge

volumes:
  mysql-data:
