server {
    listen 80;
    server_name flowalpha.store api.flowalpha.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name flowalpha.store api.flowalpha.store;

    ssl_certificate /etc/letsencrypt/live/api.flowalpha.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.flowalpha.store/privkey.pem;

    location ~ ^/api/ocr/rooms/[^/]+/ocrPage/[^/]+/sse$ {
        proxy_pass http://node-container:3000;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
	    #if ($request_method = OPTIONS) {
	    #add_header 'Access-Control-Allow-Origin' "$http_origin" always;
	    #add_header 'Access-Control-Allow-Credentials' 'true' always;
	    #add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
	    #add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept' always;
	    #add_header 'Access-Control-Max-Age' 3600 always;
	    #add_header 'Content-Length' 0;
	    #return 204;
	    #}

	    #add_header 'Access-Control-Allow-Origin' "$http_origin" always;
	    #add_header 'Access-Control-Allow-Credentials' 'true' always;

        proxy_pass http://node-container:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
